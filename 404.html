<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAIZONE - جاري التوجيه...</title>
  <style>
    body {
      margin: 0; padding: 0;
      background: #0a0e17;
      color: #ffffff;
      font-family: 'Cairo', sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; text-align: center;
    }
    .loader {
      width: 50px; height: 50px;
      border: 4px solid rgba(253, 240, 76, 0.3);
      border-top-color: #fdf04c;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: #fdf04c; text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
  </style>
  <!-- كود إعادة التوجيه الذكي لـ GitHub Pages -->
  <script>
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
  <meta http-equiv="refresh" content="0; url=./index.html">
</head>
<body>
  <div>
    <div class="loader"></div>
    <h2 style="margin-bottom: 10px;">🚀 SAIZONE</h2>
    <p style="color: #a0aec0; margin-bottom: 20px;">جاري تحميل التطبيق...</p>
    <p style="font-size: 0.9rem;">
      إذا لم يتم التوجيه تلقائياً، 
      <a href="./index.html">اضغط هنا</a>
    </p>
  </div>
</body>
</html>
