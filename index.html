<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>SAIZONE | ADMIN ID RECHARGE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --bg: #050505; --card: #111111; --accent: #3b82f6; --glow-color: rgba(59, 130, 246, 0.6); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Cairo', sans-serif; -webkit-font-smoothing: antialiased; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); color: white; overflow: hidden; }
        
        #authPage {
            position: fixed; inset: 0;
            background: url('https://images.unsplash.com/photo-1614064641938-3bbee52942c7?q=80&w=2000') no-repeat center center fixed;
            background-size: cover; display: flex; align-items: center; justify-content: center; z-index: 10000;
        }
        .login-card {
            background: rgba(0, 0, 0, 0.85); -webkit-backdrop-filter: blur(25px); backdrop-filter: blur(25px);
            width: 88%; max-width: 380px; padding: 45px 25px; border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1); text-align: center;
        }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group input {
            width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px; padding: 12px 15px 12px 45px; color: #fff; outline: none; text-align: right; font-size: 14px;
        }
        .input-group i { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.4); }
        
        .page { display: none; height: 100dvh; padding: 20px; overflow-y: auto; padding-bottom: 120px; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid #1f1f1f; }
        
        nav { position: fixed; bottom: 0; width: 100%; background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px); display: none; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1f1f1f; z-index: 5000; }
        .nav-item { color: #4b5563; font-size: 10px; text-align: center; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent); font-weight: 900; }
        
        #toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 8px 20px; border-radius: 50px; z-index: 100000; display: none; font-weight: 900; font-size: 10px; }
        
        .plan-img { width: 80px; height: 80px; object-fit: cover; border-radius: 18px; margin: 0 auto; border: 2px solid #1f1f1f; }

        .glow-box {
            background: rgba(59, 130, 246, 0.05); border: 1px solid var(--accent);
            border-radius: 18px; padding: 14px; display: flex; align-items: center; justify-content: space-between;
            margin-top: 15px; animation: pulseGlow 2s infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(59, 130, 246, 0.2); }
            50% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); }
        }

        #aiBtn { position: fixed; bottom: 100px; left: 20px; width: 50px; height: 50px; background: var(--accent); border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 6000; box-shadow: 0 0 20px var(--glow-color); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="toast"></div>
    <div id="aiBtn"><i class="fa-solid fa-robot text-white"></i></div>

    <div id="authPage">
        <div class="login-card">
            <h2 class="text-3xl font-black mb-8 italic text-white uppercase tracking-tighter">SAIZONE</h2>
            <div class="input-group"><i class="fa-solid fa-envelope"></i><input type="email" id="email" placeholder="البريد الإلكتروني"></div>
            <div class="input-group"><i class="fa-solid fa-lock"></i><input type="password" id="password" placeholder="كلمة المرور"></div>
            <button onclick="handleLogin()" class="w-full bg-white text-black py-3 rounded-full font-black mt-4">Login / Register</button>
        </div>
    </div>

    <div id="mainApp" style="display: none;">
        
        <div id="profilePage" class="page active">
            <div class="card text-center border-b-4 border-blue-600">
                <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">Main Wallet</p>
                <h2 id="userNameDisplay" class="font-black text-2xl uppercase mt-1">---</h2>
                <p id="userIdDisplay" class="text-[9px] text-gray-600 font-mono italic">UID: ---</p>
            </div>
            
            <div class="card">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-[11px] text-gray-400 font-bold">الرصيد الكلي</p>
                        <h3 class="text-4xl font-black text-blue-500">$<span id="pBalance">0.00</span></h3>
                    </div>
                    <span id="currentPlan" class="text-[10px] font-bold text-white bg-blue-600 px-4 py-1 rounded-full">No Plan</span>
                </div>
                
                <div class="glow-box">
                    <div class="flex flex-col">
                        <span class="text-[8px] text-blue-400 uppercase font-bold mb-1">Invite Link</span>
                        <span id="refLink" class="text-[10px] text-white font-mono truncate max-w-[180px]">---</span>
                    </div>
                    <button onclick="copyLink()" class="bg-blue-600 text-white text-[9px] px-4 py-2 rounded-xl font-black">COPY</button>
                </div>

                <div id="adminContainer" style="display:none;">
                    <div class="glow-box border-dashed border-red-500 bg-red-500/5">
                        <div class="flex flex-col">
                            <span class="text-[8px] text-red-400 font-bold mb-1">Admin Panel</span>
                            <span class="text-[10px] text-white font-black">Recharge System</span>
                        </div>
                        <button onclick="openAdminPanel()" class="bg-red-600 text-white text-[9px] px-4 py-2 rounded-xl font-black">RECHARGE BY ID</button>
                    </div>
                </div>

                <a href="https://t.me/SAIZONE_SUPPORT" target="_blank" class="block w-full text-center bg-zinc-900 py-3 rounded-xl mt-4 text-[10px] font-bold border border-zinc-800 text-blue-500">Support Telegram</a>
            </div>
            <button onclick="logout()" class="w-full mt-6 py-3 text-red-500 text-[10px] font-bold uppercase border border-red-900/30 rounded-xl bg-red-500/5">Logout Account</button>
        </div>

        <div id="plansPage" class="page">
            <h3 class="text-center text-[12px] text-gray-500 mb-6 font-black uppercase">Investment Plans</h3>
            <div id="plansList" class="space-y-4"></div>
        </div>

        <div id="miningPage" class="page">
            <div class="card text-center py-20 mt-10">
                <i class="fa-solid fa-microchip text-4xl text-blue-500 mb-4"></i>
                <h3 class="font-black">Cloud Mining</h3>
                <button onclick="doMining()" id="mineBtn" class="bg-blue-600 text-white w-44 mx-auto block py-3 rounded-full text-[10px] mt-8 font-black shadow-lg">Start Mining</button>
            </div>
        </div>

        <div id="depositPage" class="page">
            <div class="card text-center">
                <h3 class="font-black text-blue-500 mb-4 uppercase">Recharge / إيداع</h3>
                <div class="bg-black p-3 rounded-lg text-[9px] text-blue-400 break-all border border-blue-900 mb-6 font-mono">TTmVnVwGtMm11BkxJA7LYitCgfTqoSN8dw</div>
                <input type="text" placeholder="Wallet Address" class="w-full bg-zinc-900 p-4 rounded-xl text-center mb-3 outline-none border border-zinc-800 text-xs text-white">
                <input type="number" id="depAmt" placeholder="Amount ($)" class="w-full bg-zinc-900 p-4 rounded-xl text-center mb-3 outline-none border border-zinc-800 text-xs text-white">
                <button onclick="showToast('Request Sent! ✅')" class="w-full bg-blue-600 py-4 rounded-xl font-bold mt-4">Confirm Deposit</button>
            </div>
        </div>

        <div id="withdrawPage" class="page">
            <div class="card text-center">
                <h3 class="font-black text-gray-400 mb-4 uppercase">Withdraw / سحب</h3>
                <input type="text" id="witAddr" placeholder="USDT TRC20 Address" class="w-full bg-zinc-900 p-4 rounded-xl text-center mb-3 outline-none border border-zinc-800 text-xs text-white">
                <input type="number" id="witAmt" placeholder="Amount ($)" class="w-full bg-zinc-900 p-4 rounded-xl text-center mb-3 outline-none border border-zinc-800 text-xs text-white">
                <button onclick="showToast('Withdrawal Pending ✅')" class="w-full bg-blue-600 py-4 rounded-xl font-bold mt-4">Request Payout</button>
            </div>
        </div>

        <nav id="bottomNav">
            <div class="nav-item active" onclick="tabNav(this, 'profilePage')"><i class="fa-solid fa-user mb-1"></i><br>Profile</div>
            <div class="nav-item" onclick="tabNav(this, 'plansPage')"><i class="fa-solid fa-gem mb-1"></i><br>Plans</div>
            <div class="nav-item" onclick="tabNav(this, 'miningPage')"><i class="fa-solid fa-bolt mb-1"></i><br>Mine</div>
            <div class="nav-item" onclick="tabNav(this, 'depositPage')"><i class="fa-solid fa-plus mb-1"></i><br>Deposit</div>
            <div class="nav-item" onclick="tabNav(this, 'withdrawPage')"><i class="fa-solid fa-wallet mb-1"></i><br>Payout</div>
        </nav>
    </div>

    <script>
        const MASTER_ADMIN = "abwk18468@gmail.com";
        let userData = JSON.parse(localStorage.getItem('saizone_user'));

        function handleLogin() {
            const e = document.getElementById('email').value.trim().toLowerCase();
            const p = document.getElementById('password').value;
            if(!e || !p) return showToast("Fill all fields");
            if(!userData || userData.id === "undefined") {
                const newId = Math.floor(20260000 + Math.random() * 99999);
                userData = { email: e, name: e.split('@')[0], balance: 0, daily: 0, plan: "No Plan", lastMine: "", id: newId };
            }
            document.getElementById('authPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('bottomNav').style.display = 'flex';
            document.getElementById('aiBtn').style.display = 'flex';
            if(e === MASTER_ADMIN) document.getElementById('adminContainer').style.display = 'block';
            save();
        }

        function save() { 
            localStorage.setItem('saizone_user', JSON.stringify(userData)); 
            updateUI(); 
        }

        function updateUI() {
            if(!userData) return;
            document.getElementById('pBalance').innerText = userData.balance.toFixed(2);
            document.getElementById('userNameDisplay').innerText = userData.name;
            document.getElementById('userIdDisplay').innerText = "UID: " + userData.id;
            document.getElementById('refLink').innerText = window.location.origin + window.location.pathname + "?ref=" + userData.id;
        }

        // لوحة المدير المعدلة: تعبئة عن طريق ID
        function openAdminPanel() {
            const inputId = prompt("أدخل رقم الـ ID الخاص بالمستخدم:");
            if (!inputId) return;

            // التحقق من صحة الـ ID (يجب أن يطابق ID المستخدم الحالي في هذا الكود المحلي)
            if (parseInt(inputId) === userData.id) {
                const amount = parseFloat(prompt("أدخل المبلغ المراد تعبئته ($):"));
                if (!isNaN(amount) && amount > 0) {
                    userData.balance += amount;
                    save();
                    showToast(`تمت إضافة $${amount} للـ ID: ${inputId} بنجاح! ✅`);
                } else {
                    alert("خطأ: مبلغ غير صحيح.");
                }
            } else {
                alert("خطأ: لم يتم العثور على مستخدم بهذا الـ ID.");
            }
        }

        const plans = [
            { n: "Starter", p: 10, d: 0.20, i: "https://images.unsplash.com/photo-1639762681485-074b7f938ba0?q=80&w=400" },
            { n: "Silver", p: 50, d: 1.25, i: "https://images.unsplash.com/photo-1621416894569-0f39ed31d247?q=80&w=400" },
            { n: "Elite Plus", p: 100, d: 2.50, i: "https://images.unsplash.com/photo-1622630998477-00aa0bc61828?q=80&w=400" },
            { n: "Gold Pro", p: 200, d: 6.00, i: "https://images.unsplash.com/photo-1642104704074-907c0698bcd9?q=80&w=400" },
            { n: "VIP Diamond", p: 1000, d: 45.00, i: "https://images.unsplash.com/photo-1614332287897-cdc485fa562d?q=80&w=400" }
        ];

        plans.forEach(pl => {
            document.getElementById('plansList').innerHTML += `
            <div class="card p-4 border border-zinc-800 flex flex-col items-center">
                <img src="${pl.i}" class="plan-img mb-4">
                <h4 class="text-blue-500 font-black">${pl.n}</h4>
                <p class="text-[9px] text-zinc-500 mt-1">$${pl.p} | $${pl.d} Daily</p>
                <button onclick="buyPlan('${pl.n}', ${pl.p}, ${pl.d})" class="bg-blue-600 text-white mt-4 py-2 w-32 rounded-full font-bold text-[9px]">Activate</button>
            </div>`;
        });

        function buyPlan(n, p, d) {
            if(userData.balance < p) return showToast("Low Balance");
            userData.balance -= p; userData.daily = d; userData.plan = n; save(); showToast("Plan Active! ✅");
        }

        function doMining() {
            if(userData.daily <= 0) return showToast("No Plan");
            const today = new Date().toDateString();
            if(userData.lastMine === today) return showToast("Already Mined");
            userData.balance += userData.daily; userData.lastMine = today; save(); showToast("Success! ✅");
        }

        function logout() { localStorage.clear(); window.location.replace(window.location.origin + window.location.pathname); }
        function tabNav(el, p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(p).classList.add('active'); el.classList.add('active');
        }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 3000); }
        function copyLink() { 
            const link = document.getElementById('refLink').innerText;
            const temp = document.createElement("textarea"); document.body.appendChild(temp);
            temp.value = link; temp.select(); document.execCommand('copy'); document.body.removeChild(temp);
            showToast("Copied! ✅");
        }
        window.onload = () => { if(userData && userData.id !== "undefined") handleLogin(); };
    </script>
</body>
</html>
