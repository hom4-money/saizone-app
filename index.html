<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SAIZONE | FIXED ID SYSTEM</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --bg: #050505; --card: #111111; --text: #ffffff; --subtext: #9ca3af; --accent: #3b82f6; --border: #1f1f1f; --nav: rgba(10, 10, 10, 0.98); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Cairo', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); color: var(--text); overflow: hidden; }
        .page { display: none; height: 100dvh; padding: 15px; overflow-y: auto; padding-bottom: 110px; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        .card { background: var(--card); border-radius: 18px; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border); }
        nav { position: fixed; bottom: 0; width: 100%; background: var(--nav); backdrop-filter: blur(15px); display: none; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); z-index: 5000; }
        .nav-item { color: var(--subtext); font-size: 10px; text-align: center; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--accent); font-weight: 900; }
        .input-style { width: 100%; background: rgba(120, 120, 120, 0.1); border: 1px solid var(--border); border-radius: 12px; padding: 10px; color: var(--text); outline: none; margin-bottom: 12px; text-align: center; font-size: 12px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 8px 20px; border-radius: 50px; z-index: 100000; display: none; font-weight: 900; font-size: 11px; }
        .bot-float { position: fixed; bottom: 90px; right: 15px; width: 50px; height: 50px; background: #24A1DE; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 6000; box-shadow: 0 4px 15px rgba(36, 161, 222, 0.4); border: 2px solid white; color: white; text-decoration: none; }
        #frozenOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 20000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; }
    </style>
</head>
<body class="dark-mode">

    <div id="toast"></div>

    <div id="frozenOverlay">
        <i class="fa-solid fa-snowflake text-6xl text-blue-400 mb-6"></i>
        <h2 class="text-2xl font-black text-white mb-2">الحساب معلق</h2>
        <button onclick="location.reload()" class="mt-8 bg-white text-black px-10 py-3 rounded-full font-bold">تحديث</button>
    </div>

    <a href="https://t.me/Hassan20005pp_bot" class="bot-float" id="botIcon" style="display: none;"><i class="fa-brands fa-telegram text-2xl"></i></a>

    <div id="authPage" style="position: fixed; inset: 0; background: #050505; display: flex; align-items: center; justify-content: center; z-index: 10000;">
        <div style="width: 85%; text-align: center;">
            <h2 class="text-4xl font-black mb-10 text-white italic tracking-tighter">SAIZONE</h2>
            <input type="email" id="email" placeholder="البريد الإلكتروني" class="input-style bg-zinc-900 border-zinc-800">
            <input type="password" id="password" placeholder="كلمة المرور" class="input-style bg-zinc-900 border-zinc-800">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-full font-black mt-4 uppercase">Login</button>
        </div>
    </div>

    <div id="mainApp" style="display: none;">
        <div id="profilePage" class="page active">
            <div class="card text-center border-b-2 border-blue-600 !py-3">
                <p class="text-[9px] text-blue-500 font-bold uppercase">Account Profile</p>
                <h2 id="userNameDisplay" class="font-black text-lg uppercase">---</h2>
                <p id="userIdDisplay" class="text-[10px] text-gray-400 font-mono italic">UID: 000000</p>
            </div>

            <div onclick="copyFullRefLink()" class="card !bg-blue-600/10 !py-3 cursor-pointer">
                <p class="text-gray-400 text-[9px] font-bold">رابط الإحالة (ثابت)</p>
                <h4 id="refLinkText" class="text-white font-bold text-[10px] direction-ltr truncate">---</h4>
            </div>

            <div class="card !py-4">
                <div class="flex justify-between items-center px-2">
                    <div>
                        <p class="text-[10px] text-gray-400 font-bold uppercase">Total Balance</p>
                        <h3 class="text-3xl font-black text-blue-500">$<span id="pBalance">0.00</span></h3>
                    </div>
                    <span id="currentPlan" class="text-[9px] font-bold text-white bg-blue-600 px-3 py-1 rounded-lg italic">No Plan</span>
                </div>
                <div id="masterAdminPanel" style="display:none;" class="mt-3 pt-3 border-t border-white/5">
                    <button onclick="masterAdminControl()" class="w-full bg-blue-600 text-white py-2 rounded-xl font-black text-[10px]">ADMIN CONTROL</button>
                </div>
            </div>
            <button onclick="logout()" class="w-full mt-2 py-2 text-red-500 text-[9px] font-bold border border-red-500/10 rounded-lg">تسجيل الخروج</button>
        </div>

        <div id="plansPage" class="page"><div id="plansList" class="grid grid-cols-1 gap-3"></div></div>
        <div id="miningPage" class="page text-center"><div class="card py-10"><i class="fa-solid fa-bolt text-4xl text-blue-500 mb-4"></i><button onclick="doMining()" class="w-full bg-blue-600 text-white py-3 rounded-full font-black text-xs">تعدين</button></div></div>
        <div id="depositPage" class="page"><div class="card text-center"><input type="number" id="depAmount" placeholder="المبلغ" class="input-style"><button onclick="showToast('جاري التحقق...')" class="w-full bg-blue-600 py-3 rounded-xl font-black text-white text-xs">إيداع</button></div></div>
        <div id="withdrawPage" class="page"><div class="card"><input type="text" id="witAddress" placeholder="المحفظة" class="input-style"><input type="number" id="witAmount" placeholder="المبلغ" class="input-style"><button onclick="submitWithdraw()" class="w-full bg-blue-600 py-3 rounded-xl font-black text-white text-xs">سحب</button></div></div>

        <nav id="bottomNav">
            <div class="nav-item active" onclick="tabNav(this, 'profilePage')"><i class="fa-solid fa-user mb-1"></i><br>Profile</div>
            <div class="nav-item" onclick="tabNav(this, 'plansPage')"><i class="fa-solid fa-gem mb-1"></i><br>Plans</div>
            <div class="nav-item" onclick="tabNav(this, 'miningPage')"><i class="fa-solid fa-bolt mb-1"></i><br>Mine</div>
            <div class="nav-item" onclick="tabNav(this, 'depositPage')"><i class="fa-solid fa-plus-circle mb-1"></i><br>Deposit</div>
            <div class="nav-item" onclick="tabNav(this, 'withdrawPage')"><i class="fa-solid fa-wallet mb-1"></i><br>Payout</div>
        </nav>
    </div>

    <script>
        const MASTER_ADMIN = "abwk18468@gmail.com";
        const TG_TOKEN = "8548855381:AAE0ENEyVbRHAq-w75gIqHK1TmKV6A1pSXo"; 
        const TG_CHAT_ID = "8575658586";
        const plans = [{id:1,n:"Bronze",p:10,d:0.2},{id:2,n:"Iron",p:50,d:1.25},{id:3,n:"Steel",p:100,d:2.7},{id:4,n:"Silver",p:250,d:7.25},{id:5,n:"Gold",p:500,d:15.5},{id:6,n:"Platinum",p:1000,d:33},{id:7,n:"Emerald",p:2500,d:87.5},{id:8,n:"Sapphire",p:5000,d:185},{id:9,n:"Diamond",p:10000,d:390},{id:10,n:"Pink",p:50000,d:2100}];
        
        let userData = null;

        function handleLogin() {
            const e = document.getElementById('email').value.trim().toLowerCase();
            if(!e) return showToast("أدخل الإيميل");
            
            // جلب قاعدة البيانات المصغرة من المتصفح
            let allUsers = JSON.parse(localStorage.getItem('saizone_db') || '{}');
            
            if(allUsers[e]) {
                // إذا كان الإيميل موجوداً، استرجع بياناته (ID ثابت)
                userData = allUsers[e];
            } else {
                // إذا كان جديداً، أنشئ له بيانات ثابتة لأول مرة
                userData = { email: e, name: e.split('@')[0], balance: 0, daily: 0, plan: "No Plan", planId: 0, lastMine: "", id: Math.floor(300000 + Math.random() * 699999), isFrozen: false };
                allUsers[e] = userData;
                localStorage.setItem('saizone_db', JSON.stringify(allUsers));
            }

            if(userData.isFrozen) { document.getElementById('frozenOverlay').style.display = 'flex'; return; }
            
            localStorage.setItem('saizone_current', e); // حفظ الجلسة الحالية
            showApp();
        }

        function showApp() {
            document.getElementById('authPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('bottomNav').style.display = 'flex';
            document.getElementById('botIcon').style.display = 'flex';
            if(userData.email === MASTER_ADMIN) document.getElementById('masterAdminPanel').style.display = 'block';
            initPlans(); updateUI();
        }

        function masterAdminControl() {
            const tid = prompt("أدخل UID الحساب:");
            if(!tid) return;
            // البحث عن الحساب في قاعدة البيانات المحلية بالـ ID
            let db = JSON.parse(localStorage.getItem('saizone_db') || '{}');
            let foundEmail = Object.keys(db).find(key => db[key].id == tid);

            if(!foundEmail) return showToast("الحساب غير موجود");

            const act = prompt("UID: " + tid + "\n1. شحن | 2. تصفير | 3. تجميد/فك | 4. ترقية");
            if(act == "1") {
                const a = parseFloat(prompt("المبلغ:"));
                if(!isNaN(a)) { db[foundEmail].balance += a; showToast("تم الشحن ✅"); }
            } else if(act == "2") {
                db[foundEmail].balance = 0; db[foundEmail].plan = "No Plan"; db[foundEmail].planId = 0;
            } else if(act == "3") {
                db[foundEmail].isFrozen = !db[foundEmail].isFrozen;
                showToast("تغيرت حالة التجميد ✅");
            } else if(act == "4") {
                const lv = parseInt(prompt("مستوى 1-10:"));
                const p = plans.find(x => x.id === lv);
                if(p) { db[foundEmail].plan = p.n; db[foundEmail].planId = p.id; db[foundEmail].daily = p.d; }
            }
            
            localStorage.setItem('saizone_db', JSON.stringify(db));
            if(userData.email === foundEmail) { userData = db[foundEmail]; updateUI(); }
        }

        function save() {
            let db = JSON.parse(localStorage.getItem('saizone_db') || '{}');
            db[userData.email] = userData;
            localStorage.setItem('saizone_db', JSON.stringify(db));
            updateUI();
        }

        function updateUI() {
            if(!userData) return;
            document.getElementById('pBalance').innerText = userData.balance.toFixed(2);
            document.getElementById('userNameDisplay').innerText = userData.name;
            document.getElementById('userIdDisplay').innerText = "UID: " + userData.id;
            document.getElementById('currentPlan').innerText = userData.plan;
            const baseUrl = window.location.href.split('#')[0].split('?')[0]; 
            document.getElementById('refLinkText').innerText = baseUrl + "#ref=" + userData.id;
        }

        function initPlans() {
            const list = document.getElementById('plansList'); list.innerHTML = "";
            plans.forEach(pl => {
                const isC = userData.planId === pl.id; const isL = userData.planId > pl.id;
                list.innerHTML += `<div class="card text-center ${isL ? 'opacity-40' : ''} !py-3">
                    <h4 class="font-black text-blue-500 text-sm">${pl.n}</h4>
                    <p class="text-[9px]">$${pl.p} | ربح $${pl.d}</p>
                    <button onclick="buyPlan(${pl.id},'${pl.n}',${pl.p},${pl.d})" class="bg-blue-600 text-white px-6 py-1 rounded-full text-[9px] mt-1 font-bold" ${isL || isC ? 'disabled' : ''}>${isC ? 'نشطة' : 'تفعيل'}</button>
                </div>`;
            });
        }

        function buyPlan(id, n, p, d) {
            if(userData.balance < p) return showToast("الرصيد غير كافٍ");
            userData.balance -= p; userData.plan = n; userData.planId = id; userData.daily = d;
            save(); initPlans();
        }

        function doMining() {
            if(userData.planId === 0) return showToast("فعل خطة أولاً");
            if(userData.lastMine === new Date().toDateString()) return showToast("تم التعدين اليوم");
            userData.balance += userData.daily; userData.lastMine = new Date().toDateString();
            save(); showToast("تمت الإضافة ✅");
        }

        async function submitWithdraw() {
            const addr = document.getElementById('witAddress').value;
            const amt = parseFloat(document.getElementById('witAmount').value);
            if(!addr || isNaN(amt) || amt < 5) return showToast("خطأ في البيانات");
            if(amt > userData.balance) return showToast("رصيد ناقص");
            const msg = `💰 سحب\n📧 ${userData.email}\n🆔 ${userData.id}\n💵 $${amt}\n🏦 ${addr}`;
            await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${encodeURIComponent(msg)}`);
            userData.balance -= amt; save(); showToast("تم الطلب ✅");
        }

        function tabNav(el, p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(p).classList.add('active'); el.classList.add('active');
        }

        function copyFullRefLink() { navigator.clipboard.writeText(document.getElementById('refLinkText').innerText); showToast("تم النسخ ✅"); }
        
        function logout() { 
            localStorage.removeItem('saizone_current'); 
            location.reload(); 
        }

        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 3000); }

        window.onload = () => { 
            const savedEmail = localStorage.getItem('saizone_current');
            if(savedEmail) {
                let db = JSON.parse(localStorage.getItem('saizone_db') || '{}');
                if(db[savedEmail]) {
                    userData = db[savedEmail];
                    if(userData.isFrozen) { document.getElementById('frozenOverlay').style.display = 'flex'; }
                    else { showApp(); }
                }
            }
        };
    </script>
</body>
</html>
